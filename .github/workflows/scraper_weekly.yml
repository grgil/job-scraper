name: Weekly Primary Job Digest

on:
  schedule:
    - cron: '0 7 * * 0'   # Sunday 7:00 AM UTC — 1 hr after daily (0 6 * * *) to avoid seen_jobs push conflict
  workflow_dispatch:        # enables manual Run button in GitHub UI

permissions:
  contents: write           # required to commit seen_jobs.json back to the repo

jobs:
  weekly-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run weekly recap
        run: python scraper.py --weekly
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASS: ${{ secrets.EMAIL_APP_PASS }}

      - name: Commit seen jobs cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen_jobs cache (weekly) [skip ci]"
          git pull --rebase origin main
          git push
