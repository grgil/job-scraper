name: Weekly Primary Job Digest

on:
  schedule:
    - cron: '0 7 * * 0'   # Sunday 7:00 AM UTC — 1 hr after daily to avoid seen_jobs push conflict
  workflow_dispatch:        # enables manual Run button in GitHub UI

permissions:
  contents: write           # required to commit seen_jobs.json back to the repo

jobs:
  weekly-digest:
    uses: ./.github/workflows/_scraper_run.yml
    with:
      run_args: "--weekly"
      commit_message: "chore: update seen_jobs cache (weekly) [skip ci]"
    secrets: inherit
