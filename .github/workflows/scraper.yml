name: Health Job Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC = 2:00 AM EDT / 1:00 AM EST — captures yesterday's postings
  workflow_dispatch:        # enables manual Run button in GitHub UI

permissions:
  contents: write           # required to commit seen_jobs.json back to the repo

jobs:
  scrape:
    uses: ./.github/workflows/_scraper_run.yml
    with:
      commit_message: "chore: update seen_jobs cache [skip ci]"
    secrets: inherit
